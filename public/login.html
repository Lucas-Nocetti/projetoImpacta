<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Manager | Login</title>
    <meta name="description" content="Acesse o Task Manager para acompanhar seus projetos e tarefas." />
    <meta name="robots" content="noindex, nofollow" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header>
      <div class="brand">
        <h1>Task Manager</h1>
        <p>Entre para continuar</p>
      </div>
    </header>

    <main>
      <section class="card auth-card auth-single">
        <h2>Login</h2>
        <form id="login-form">
          <input type="email" id="login-email" placeholder="email@empresa.com" required />
          <input type="password" id="login-password" placeholder="Senha" required />
          <button type="submit">Entrar</button>
        </form>
        <p class="hint auth-switch">
          Ainda não tem conta? <a href="/register">Criar cadastro</a>
        </p>
      </section>
    </main>

    <div id="toast"></div>
    <script src="./form-feedback.js"></script>
    <script src="./login.js"></script>
  </body>
</html>
